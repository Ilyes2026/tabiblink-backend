spring.application.name=tabiblink-backend

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/tabiblink?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:Tabiblink2026}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

server.port=${PORT:8081}

BREVO_API_KEY=${BREVO_API_KEY}



admin.default.email=${ADMIN_EMAIL:admin@tabiblink.com}
admin.default.password=${ADMIN_PASSWORD:Tabiblink2026}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=60MB

